<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旗魚城 — 互動敘事地圖</title>
<style>
:root {
  --bg: #060d14;
  --bg2: #0c1620;
  --bg3: #13202e;
  --text: #dce5f0;
  --text2: #7a8da0;
  --text3: #4a5e72;
  --accent: #0ea5e9;
  --accent2: #2563eb;
  --accent-glow: rgba(14,165,233,0.15);
  --accent2-glow: rgba(37,99,235,0.15);
  --border: #1c2e40;
  --card: #0b1824;
  --card-hover: #10202e;
  --warm: #f59e0b;
  --pink: #ec4899;
  --tag-char: #38bdf8;
  --tag-loc: #4ade80;
  --tag-action: #f97316;
  --tag-cond: #a78bfa;
  --tag-default: rgba(255,255,255,0.06);
  --radius: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  height: 100vh;
  overflow: hidden;
}
.app { display: flex; height: 100vh; flex-direction: column; }

/* === Game Banner === */
.game-banner {
  background: linear-gradient(135deg, #041525 0%, #0a1e30 40%, #0c2540 100%);
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.game-banner::before {
  content: '';
  position: absolute;
  top: -50%; right: -5%;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(14,165,233,0.1), transparent 60%);
  pointer-events: none;
  animation: wave-float 8s ease-in-out infinite;
}
.game-banner::after {
  content: '';
  position: absolute;
  bottom: -40%; left: 10%;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(37,99,235,0.07), transparent 60%);
  pointer-events: none;
  animation: wave-float 10s ease-in-out infinite reverse;
}
@keyframes wave-float {
  0%, 100% { opacity: 0.6; transform: translateX(0) scale(1); }
  50% { opacity: 1; transform: translateX(8px) scale(1.05); }
}
.banner-top { display: flex; align-items: center; gap: 16px; position: relative; z-index: 1; }
.banner-icon {
  width: 52px; height: 52px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
  box-shadow: 0 4px 20px rgba(14,165,233,0.35);
}
.banner-text h1 {
  font-size: 24px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.5px;
}
.banner-text .subtitle {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  margin-top: 2px;
}
.banner-stats {
  display: flex; gap: 16px; flex-wrap: wrap;
  margin-top: 12px;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  position: relative; z-index: 1;
}
.stat-item { display: flex; align-items: center; gap: 4px; }
.stat-item b { color: var(--accent); }

/* === Toolbar === */
.toolbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.search-wrap {
  position: relative;
  flex-shrink: 1;
  min-width: 140px;
}
.search-wrap::before {
  content: '\1F50D';
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  font-size: 13px;
  pointer-events: none;
  z-index: 1;
}
.search-box {
  padding: 6px 14px 6px 32px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  width: 240px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-wrap .search-box { width: 100%; padding-left: 32px; }
.search-box:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.search-box::placeholder { color: var(--text3); }
.toolbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}
.toggle-row {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
}
.toggle-row input { accent-color: var(--accent); cursor: pointer; width: 14px; height: 14px; }
.toggle-row:hover { color: var(--text); }
.view-toggle { display: flex; gap: 3px; }
.view-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.view-btn:hover { background: var(--bg3); color: var(--text); }
.view-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  box-shadow: 0 2px 8px rgba(14,165,233,0.35);
}

/* === Content === */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px 60px;
  scroll-behavior: smooth;
}

/* === Group Headers === */
.group-header {
  width: 100%;
  background: linear-gradient(135deg, var(--bg3), var(--bg2));
  padding: 14px 20px;
  margin: 16px 0 4px 0;
  border-radius: var(--radius);
  position: sticky;
  top: 0; z-index: 10;
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 12px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: border-color 0.2s;
}
.group-header:first-child { margin-top: 0; }
.group-header:hover { border-color: var(--accent); }
.group-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}
.group-arrow {
  font-size: 10px;
  color: var(--text3);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.group-arrow.open { transform: rotate(90deg); }
.group-info { flex: 1; min-width: 0; }
.group-header h2 {
  font-size: 16px; font-weight: 600; color: #fff;
  margin: 0; border: none; padding: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.group-header .group-name-en {
  font-size: 11px; color: var(--text3); margin-top: 1px;
}
.group-header .group-stats {
  font-size: 11px; color: var(--text2); flex-shrink: 0;
  display: flex; align-items: center; gap: 8px;
}
.group-header .group-stats b { color: var(--accent); }
.group-body { display: none; padding: 2px 0; }
.group-body.open { display: block; }

/* === Passage Cards === */
.passage {
  background: var(--card);
  padding: 14px 18px;
  margin: 4px 0;
  border-radius: 8px;
  border-left: 3px solid transparent;
  transition: all 0.2s;
  position: relative;
}
.passage:hover {
  border-left-color: var(--accent);
  background: var(--card-hover);
}
.passage-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.passage-title {
  font-size: 13px; font-weight: 600;
  color: var(--accent);
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.passage .pid {
  font-size: 10px; color: var(--text3);
  font-family: 'Consolas', monospace; flex-shrink: 0;
}
.passage .tag-row { margin-bottom: 6px; display: flex; flex-wrap: wrap; gap: 3px; }
.passage .tag {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 500;
}
.tag-char { background: rgba(56,189,248,0.12); color: var(--tag-char); }
.tag-loc { background: rgba(74,222,128,0.12); color: var(--tag-loc); }
.tag-action { background: rgba(249,115,22,0.12); color: var(--tag-action); }
.tag-cond { background: rgba(167,139,250,0.12); color: var(--tag-cond); }
.tag-default { background: rgba(255,255,255,0.06); color: var(--text2); }
.passage .text {
  font-size: 14px; line-height: 1.85;
  color: var(--text);
  white-space: pre-wrap; word-break: break-word;
}
.passage .text-en {
  font-size: 12px; color: var(--text2);
  margin-top: 8px; padding-top: 8px;
  border-top: 1px dashed var(--border);
  font-style: italic; line-height: 1.6;
  white-space: pre-wrap;
  max-height: 120px; overflow: hidden;
  position: relative;
}
.passage .text-en.collapsed::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(transparent, var(--card));
  pointer-events: none;
}
.passage .choices-row {
  margin-top: 8px; padding-top: 8px;
  border-top: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 4px;
}
.choice-btn {
  padding: 3px 10px;
  border-radius: 14px;
  background: var(--accent-glow);
  border: 1px solid rgba(14,165,233,0.25);
  color: var(--accent);
  font-size: 11px;
  cursor: default;
}
.passage-img {
  max-width: 100%;
  max-height: 400px;
  border-radius: 8px;
  margin: 8px 0;
  display: block;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.passage-img:hover {
  transform: scale(1.02);
  box-shadow: 0 4px 20px rgba(14,165,233,0.3);
}

/* === NPC Gallery (Scene View) === */
.npc-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 8px;
  padding: 8px;
}
.npc-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  text-align: center;
  transition: border-color 0.2s, transform 0.2s;
  cursor: pointer;
}
.npc-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}
.npc-card img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  display: block;
}
.npc-card .npc-name {
  padding: 4px 6px;
  font-size: 10px;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* === Lightbox === */
.lightbox-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.92);
  z-index: 9999;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  backdrop-filter: blur(8px);
}
.lightbox-overlay.active { display: flex; }
.lightbox-overlay img {
  max-width: 92vw;
  max-height: 90vh;
  border-radius: 8px;
  box-shadow: 0 8px 40px rgba(14,165,233,0.3);
  cursor: default;
}
.lightbox-close {
  position: absolute;
  top: 16px; right: 20px;
  font-size: 28px;
  color: #fff;
  cursor: pointer;
  opacity: 0.7;
  transition: opacity 0.2s;
  z-index: 10000;
  background: none; border: none;
}
.lightbox-close:hover { opacity: 1; }
.lightbox-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 36px;
  color: #fff;
  cursor: pointer;
  opacity: 0.5;
  transition: opacity 0.2s;
  background: none; border: none;
  padding: 20px;
  z-index: 10000;
}
.lightbox-nav:hover { opacity: 1; }
.lightbox-prev { left: 8px; }
.lightbox-next { right: 8px; }

/* === States === */
.loading {
  text-align: center; padding: 80px 20px; color: var(--text2);
}
.loading .spinner {
  display: inline-block;
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text2); font-size: 14px;
}

/* === Scrollbar === */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* === Keyboard shortcut hint === */
.kb-hint {
  position: fixed; bottom: 12px; right: 16px;
  font-size: 10px; color: var(--text3);
  pointer-events: none; z-index: 100;
}
.kb-hint kbd {
  padding: 1px 4px; border-radius: 3px;
  background: var(--bg2); border: 1px solid var(--border);
  font-family: inherit;
}

/* === Mobile === */
@media (max-width: 768px) {
  .game-banner { padding: 16px; }
  .banner-text h1 { font-size: 20px; }
  .content { padding: 10px 12px 40px; }
  .passage .text { font-size: 15px; line-height: 1.9; }
  .toolbar { padding: 6px 10px; gap: 6px; }
  .search-wrap { width: 100%; }
  .search-box { width: 100%; }
  .toolbar-right { margin-left: 0; width: 100%; flex-wrap: wrap; justify-content: center; }
  .view-toggle { width: 100%; justify-content: center; }
  .group-header { padding: 10px 14px; }
  .group-header h2 { font-size: 15px; }
  .kb-hint { display: none; }
  .npc-gallery { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
}
</style>
</head>
<body>
<div class="app">
  <div class="game-banner">
    <div class="banner-top">
      <div class="banner-icon">&#x1F3D9;</div>
      <div class="banner-text">
        <h1 id="gameTitle">旗魚城</h1>
        <div class="subtitle" id="gameSubtitle">Sunfish City | 城市生活模擬</div>
      </div>
    </div>
    <div class="banner-stats" id="bannerStats"></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <input type="text" class="search-box" id="searchBox" placeholder="搜尋段落、場景、內容...">
    </div>
    <div class="toolbar-right">
      <label class="toggle-row">
        <input type="checkbox" id="showZh" checked>
        <span>中文</span>
      </label>
      <label class="toggle-row">
        <input type="checkbox" id="showEn">
        <span>英文</span>
      </label>
      <label class="toggle-row">
        <input type="checkbox" id="showChoices" checked>
        <span>選項</span>
      </label>
      <label class="toggle-row">
        <input type="checkbox" id="showCond">
        <span>條件</span>
      </label>
      <div class="view-toggle">
        <button class="view-btn active" data-view="narrative" id="viewNarrative">敘事</button>
        <button class="view-btn" data-view="scene" id="viewScene">場景</button>
        <button class="view-btn" data-view="all" id="viewAll">全部</button>
      </div>
    </div>
  </div>

  <div class="content" id="content">
    <div class="loading">
      <div class="spinner"></div>
      <div>載入敘事數據中...</div>
    </div>
  </div>
</div>

<div class="kb-hint">
  <kbd>/</kbd> 搜尋 &nbsp; <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> 切換視圖 &nbsp; <kbd>Esc</kbd> 清除
</div>

<div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox(event)">&times;</button>
  <button class="lightbox-nav lightbox-prev" onclick="navLightbox(-1,event)">&#8249;</button>
  <img id="lightboxImg" src="" alt="">
  <button class="lightbox-nav lightbox-next" onclick="navLightbox(1,event)">&#8250;</button>
</div>

<script>
// ============================================================
// Sunfish City - Enhanced Narrative Viewer (3-View + NPC Gallery)
// ============================================================

const CHUNK_SIZE = 60;

// Group icons: [color, emoji, name_zh, name_en]
const GROUP_ICONS = {
  'CommitCrime': ['#ef4444', '\u{1F6A8}', '犯罪', 'Commit Crime'],
  'Funny': ['#f59e0b', '\u{1F602}', '搞笑', 'Funny Events'],
  'Home': ['#22c55e', '\u{1F3E0}', '家', 'Home'],
  'Important': ['#8b5cf6', '\u{2B50}', '重要', 'Important'],
  'Internet': ['#3b82f6', '\u{1F310}', '網路', 'Internet'],
  'Intro': ['#0ea5e9', '\u{1F3AC}', '序章', 'Introduction'],
  'Job': ['#f97316', '\u{1F4BC}', '工作', 'Jobs'],
  'Location': ['#14b8a6', '\u{1F4CD}', '地點', 'Locations'],
  'Patrol': ['#6366f1', '\u{1F46E}', '巡邏', 'Patrol'],
  'PatrolCrime': ['#dc2626', '\u{1F6A8}', '巡邏犯罪', 'Patrol Crime'],
  'Phone': ['#ec4899', '\u{1F4F1}', '電話', 'Phone'],
  'Prawn': ['#f43f5e', '\u{1F990}', '蝦', 'Prawn'],
  'SecretLocation': ['#a855f7', '\u{1F510}', '秘密地點', 'Secret Location'],
  'Secretary': ['#e879f9', '\u{1F4DD}', '秘書', 'Secretary'],
  'Shop': ['#84cc16', '\u{1F6D2}', '店鋪', 'Shop'],
  'deprecated': ['#64748b', '\u{1F5D1}', '已棄用', 'Deprecated'],
  'header': ['#475569', '\u{1F4C4}', '標頭', 'Header'],
  'init': ['#94a3b8', '\u{2699}', '初始化', 'Initialization'],
  'widget': ['#78716c', '\u{1F527}', '小部件', 'Widgets'],
  '(未分類)': ['#64748b', '\u{1F4C2}', '未分類', 'Uncategorized']
};

// Scene view category grouping
const SCENE_CATEGORIES = {
  'story': { name: '故事流程', en: 'Story Flow', color: '#8b5cf6', groups: ['Intro', 'Important', 'Funny'] },
  'location': { name: '地點探索', en: 'Locations', color: '#14b8a6', groups: ['Location', 'Home', 'SecretLocation', 'Shop'] },
  'work': { name: '工作與任務', en: 'Work & Tasks', color: '#f97316', groups: ['Job', 'Secretary', 'Patrol', 'PatrolCrime', 'CommitCrime'] },
  'social': { name: '社交活動', en: 'Social', color: '#ec4899', groups: ['Phone', 'Internet', 'Prawn'] },
  'system': { name: '系統', en: 'System', color: '#64748b', groups: ['init', 'widget', 'header', 'deprecated', '(未分類)'] }
};

// === State ===
let DATA = null;
let searchQuery = '';
let showZh = true;
let showEn = false;
let showChoices = true;
let showCond = false;
let currentView = 'narrative';
let openSections = new Set();

// === Data Loading ===
async function loadData() {
  try {
    const resp = await fetch('data/passages.json?v=' + Date.now());
    DATA = await resp.json();
    if (!DATA.meta.has_zh) {
      document.getElementById('showZh').parentElement.style.display = 'none';
      showZh = false;
      showEn = true;
      document.getElementById('showEn').checked = true;
    }
    init();
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="empty-state">載入失敗: ' + e.message + '</div>';
  }
}

// === Banner ===
function renderBanner() {
  const m = DATA.meta;
  const total = m.total || DATA.passages.length;
  const groups = (DATA.groups || []).length;
  const zhCount = m.translated_count || DATA.passages.filter(p => p.content_zh).length;
  const pct = total > 0 ? Math.round(zhCount / total * 100) : 0;
  const totalChoices = DATA.passages.reduce((s, p) => {
    const c = (p.content || '').match(/\[\[[^\]]*\]\]/g);
    return s + (c ? c.length : 0);
  }, 0);

  document.getElementById('bannerStats').innerHTML =
    `<span class="stat-item"><b>${groups}</b> 分類</span>` +
    `<span class="stat-item"><b>${total.toLocaleString()}</b> 段落</span>` +
    `<span class="stat-item"><b>${totalChoices.toLocaleString()}</b> 選項</span>` +
    `<span class="stat-item" style="color:${pct>=95?'#4ade80':'#fbbf24'}">${pct}% 已翻譯</span>`;
}

// === Filtering ===
function getFiltered() {
  let passages = DATA.passages;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    passages = passages.filter(p =>
      (p.content_zh || '').toLowerCase().includes(q) ||
      (p.content || '').toLowerCase().includes(q) ||
      (p.name || '').toLowerCase().includes(q) ||
      (p.group || '').toLowerCase().includes(q)
    );
  }
  return passages;
}

// === Passage Title ===
function getPassageTitle(p) {
  if (p.title && p.title.length > 2 && p.title.length < 80) return p.title;
  const name = p.name || '';
  if (name && !/^(g\d|passage_|p\d|#|\d+$)/.test(name) && name.length > 2 && name.length < 80) return name;
  if (p.content_zh) {
    const first = p.content_zh.replace(/<<[^>]*?>>/g, '').replace(/<[^>]*>/g, '').replace(/\[.*?\]/g, '').split(/[\u3002\uff01\uff1f\n]/)[0].trim();
    if (first.length > 4) return first.length > 50 ? first.substring(0, 47) + '...' : first;
  }
  if (p.content) {
    const first = p.content.replace(/<<[^>]*?>>/g, '').replace(/<[^>]*>/g, '').split(/[.!?\n]/)[0].trim();
    if (first.length > 4) return first.length > 50 ? first.substring(0, 47) + '...' : first;
  }
  return name || 'Passage ' + p.pid;
}

// === Condition Extraction ===
function extractConditions(text) {
  if (!text) return [];
  const conds = [];
  const re = /<<(?:else)?if\s+([^>]+?)>>/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    conds.push(m[1].trim());
  }
  return conds;
}

// === Extract choices from [[link]] syntax ===
function extractChoices(content) {
  if (!content) return [];
  const choices = [];
  const re = /\[\[([^\]|]*?)(?:\|([^\]]*?))?\]\]/g;
  let m;
  while ((m = re.exec(content)) !== null) {
    const text = m[1].trim();
    const target = (m[2] || m[1]).trim();
    if (text && text.length < 120 && !/^(INCLUDE|IF|SET)/.test(text)) {
      choices.push({ text, target });
    }
  }
  return choices;
}

// === Text Formatting ===
function formatText(s) {
  if (!s) return '';
  let text = s;
  const imgs = [];
  // Extract <img> tags before escaping
  text = text.replace(/<img\s[^>]*>/gi, m => {
    const i = imgs.length;
    const srcMatch = m.match(/src=["']([^"']+)["']/i);
    const src = srcMatch ? srcMatch[1] : '';
    if (src && !src.startsWith('_')) {
      imgs.push(`<img class="passage-img" src="${src}" loading="lazy" onclick="openLightbox(this.src)" alt="">`);
    }
    return imgs.length > 0 ? ' IMG' + (imgs.length - 1) + ' ' : '';
  });
  // Extract [img[path]] and [image: path]
  text = text.replace(/\[img\[([^\]]+?)\](?:\[[^\]]*\])?\]/gi, (m, src) => {
    if (src.startsWith('_')) return '';
    const i = imgs.length;
    imgs.push(`<img class="passage-img" src="${src}" loading="lazy" onclick="openLightbox(this.src)" alt="">`);
    return ' IMG' + i + ' ';
  });
  text = text.replace(/\[image:\s*([^\]]+)\]/gi, (m, src) => {
    const cleanSrc = src.trim().replace(/^\.\//, '');
    if (cleanSrc.startsWith('_')) return '';
    const i = imgs.length;
    imgs.push(`<img class="passage-img" src="${cleanSrc}" loading="lazy" onclick="openLightbox(this.src)" alt="">`);
    return ' IMG' + i + ' ';
  });
  // Strip style/script
  text = text.replace(/<style[\s\S]*?<\/style>/gi, '');
  text = text.replace(/<script[\s\S]*?<\/script>/gi, '');
  // Strip remaining HTML
  text = text.replace(/<[^>]*>/g, ' ');
  // Strip Twine macros
  text = text.replace(/<<[^>]*?>>/g, '');
  // Strip [[link|target]] and [[link]]
  text = text.replace(/\[\[([^\]|]*?)(?:\|[^\]]*?)?\]\]/g, '');
  text = text.replace(/==[^=]*?==/g, '');
  text = text.replace(/\[INCLUDE:\s*[^\]]*\]/g, '');
  // Strip CSS/JS artifacts
  text = text.replace(/\/\*[\s\S]*?\*\//g, '');
  text = text.replace(/\{[\s\S]*?\}/g, '');
  text = text.replace(/^::\s+.*$/gm, '');
  text = text.replace(/\n{3,}/g, '\n\n').replace(/[ \t]+/g, ' ').trim();
  let html = escHtml(text);
  // Restore preserved images
  html = html.replace(/ IMG(\d+) /g, (_, i) => imgs[+i] || '');
  html = html.replace(/\n\n+/g, '</p><p>').replace(/\n/g, '<br>');
  return '<p>' + html + '</p>';
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// === Tag Class ===
function tagClass(tag) {
  const t = (tag || '').toLowerCase();
  if (['commitcrime', 'patrolcrime', 'patrol'].includes(t)) return 'tag-action';
  if (['location', 'home', 'secretlocation', 'shop'].includes(t)) return 'tag-loc';
  if (['intro', 'important'].includes(t)) return 'tag-cond';
  if (['secretary', 'job'].includes(t)) return 'tag-char';
  return 'tag-default';
}

// === Passage HTML ===
function passageHtml(p) {
  const title = getPassageTitle(p);
  const pid = p.pid != null ? `<span class="pid">#${p.pid}</span>` : '';

  const tags = (p.tags && p.tags.length > 0)
    ? `<div class="tag-row">${p.tags.filter(t => t !== p.group).map(t =>
        `<span class="tag ${tagClass(t)}">${escHtml(t)}</span>`
      ).join('')}</div>`
    : '';

  let condHtml = '';
  if (showCond) {
    const conds = extractConditions(p.content || '');
    if (conds.length > 0) {
      condHtml = `<div class="tag-row">${conds.slice(0, 5).map(c =>
        `<span class="tag tag-cond" title="${escHtml(c)}">${escHtml(c.length > 30 ? c.substring(0,27)+'...' : c)}</span>`
      ).join('')}</div>`;
    }
  }

  const TEXT_LIMIT = 5000;
  let textHtml = '';
  if (showZh && p.content_zh) {
    const t = p.content_zh.length > TEXT_LIMIT ? p.content_zh.substring(0, TEXT_LIMIT) : p.content_zh;
    const trunc = p.content_zh.length > TEXT_LIMIT ? `<div style="color:var(--tag-cond);font-size:11px;margin-top:4px">... 已截斷 (${(p.content_zh.length/1000).toFixed(0)}K)</div>` : '';
    textHtml += `<div class="text">${formatText(t)}</div>${trunc}`;
  }
  if (showEn && p.content) {
    const t = p.content.length > TEXT_LIMIT ? p.content.substring(0, TEXT_LIMIT) : p.content;
    const trunc = p.content.length > TEXT_LIMIT ? `<div style="color:var(--tag-cond);font-size:11px;margin-top:4px">... truncated (${(p.content.length/1000).toFixed(0)}K)</div>` : '';
    if (showZh && p.content_zh) {
      const isLong = t.length > 300;
      textHtml += `<div class="text-en${isLong ? ' collapsed' : ''}">${formatText(t)}</div>${trunc}`;
    } else {
      textHtml += `<div class="text">${formatText(t)}</div>${trunc}`;
    }
  }
  if (!textHtml) {
    textHtml = p.content_zh
      ? `<div class="text">${formatText(p.content_zh.length > TEXT_LIMIT ? p.content_zh.substring(0, TEXT_LIMIT) : p.content_zh)}</div>`
      : p.content
        ? `<div class="text">${formatText(p.content.length > TEXT_LIMIT ? p.content.substring(0, TEXT_LIMIT) : p.content)}</div>`
        : '<div class="text" style="color:var(--text3)">(empty)</div>';
  }

  const choices = extractChoices(p.content || '');
  let choicesHtml = '';
  if (showChoices && choices.length > 0) {
    choicesHtml = `<div class="choices-row">${choices.slice(0, 20).map(c =>
      `<span class="choice-btn" title="-> ${escHtml(c.target)}">${escHtml(c.text)}</span>`
    ).join('')}</div>`;
  }

  return `<div class="passage">
    <div class="passage-header">
      <span class="passage-title">${escHtml(title)}</span>
      ${pid}
    </div>
    ${tags}${condHtml}${textHtml}${choicesHtml}
  </div>`;
}

// === Chunked Rendering ===
function renderChunked(container, passages, startIdx) {
  const end = Math.min(startIdx + CHUNK_SIZE, passages.length);
  let html = '';
  for (let i = startIdx; i < end; i++) {
    html += passageHtml(passages[i]);
  }
  container.insertAdjacentHTML('beforeend', html);

  if (end < passages.length) {
    const sentinel = document.createElement('div');
    sentinel.className = 'loading';
    sentinel.style.padding = '16px';
    sentinel.innerHTML = `<div style="font-size:11px;color:var(--text3)">載入更多 (${end}/${passages.length})...</div>`;
    container.appendChild(sentinel);

    const obs = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) {
        obs.disconnect();
        sentinel.remove();
        renderChunked(container, passages, end);
      }
    });
    obs.observe(sentinel);
  }
}

// === Group Passages ===
function groupPassages(passages) {
  const groups = new Map();
  passages.forEach(p => {
    const g = p.group || '(未分類)';
    if (!groups.has(g)) groups.set(g, []);
    groups.get(g).push(p);
  });
  if (DATA.groups && DATA.groups.length > 0) {
    const ordered = [];
    const seen = new Set();
    DATA.groups.forEach(gi => {
      const key = gi.id || gi.name;
      if (groups.has(key)) { ordered.push([key, groups.get(key)]); seen.add(key); }
    });
    groups.forEach((v, k) => { if (!seen.has(k)) ordered.push([k, v]); });
    return ordered;
  }
  return Array.from(groups.entries()).sort((a, b) => b[1].length - a[1].length);
}

// === Narrative View (by group) ===
function renderNarrativeView(passages) {
  const content = document.getElementById('content');
  content.innerHTML = '';
  const groups = groupPassages(passages);

  if (groups.length === 0) {
    content.innerHTML = '<div class="empty-state">未找到匹配的段落</div>';
    return;
  }

  groups.forEach(([gName, gPassages]) => {
    const isOpen = openSections.has('g:' + gName);
    const iconInfo = GROUP_ICONS[gName] || ['#64748b', gName.substring(0, 2).toUpperCase(), gName, ''];

    const header = document.createElement('div');
    header.className = 'group-header';
    header.innerHTML = `
      <div class="group-icon" style="background:${iconInfo[0]}22;color:${iconInfo[0]}">${iconInfo[1]}</div>
      <span class="group-arrow${isOpen ? ' open' : ''}">&#9654;</span>
      <div class="group-info">
        <h2>${escHtml(iconInfo[2])}</h2>
        <div class="group-name-en">${escHtml(iconInfo[3] || gName)}</div>
      </div>
      <div class="group-stats">
        <span><b>${gPassages.length}</b> 段落</span>
      </div>
    `;

    const body = document.createElement('div');
    body.className = 'group-body' + (isOpen ? ' open' : '');

    header.addEventListener('click', () => {
      const nowOpen = body.classList.toggle('open');
      header.querySelector('.group-arrow').classList.toggle('open', nowOpen);
      if (nowOpen) {
        openSections.add('g:' + gName);
        if (!body.dataset.rendered) {
          renderChunked(body, gPassages, 0);
          body.dataset.rendered = '1';
        }
      } else {
        openSections.delete('g:' + gName);
      }
    });

    if (isOpen && !body.dataset.rendered) {
      renderChunked(body, gPassages, 0);
      body.dataset.rendered = '1';
    }

    content.appendChild(header);
    content.appendChild(body);
  });
}

// === Scene View (by category + NPC gallery) ===
function renderSceneView(passages) {
  const content = document.getElementById('content');
  content.innerHTML = '';

  if (passages.length === 0) {
    content.innerHTML = '<div class="empty-state">未找到匹配的段落</div>';
    return;
  }

  const allGroups = groupPassages(passages);
  const groupMap = new Map(allGroups);

  // Render by scene category
  Object.entries(SCENE_CATEGORIES).forEach(([catId, cat]) => {
    const catPassages = [];
    const subGroups = [];
    cat.groups.forEach(gId => {
      if (groupMap.has(gId)) {
        const gp = groupMap.get(gId);
        catPassages.push(...gp);
        subGroups.push([gId, gp]);
      }
    });
    if (catPassages.length === 0) return;

    const isOpen = openSections.has('sc:' + catId);
    const header = document.createElement('div');
    header.className = 'group-header';
    header.style.background = `linear-gradient(135deg, ${cat.color}12, var(--bg2))`;
    header.innerHTML = `
      <div class="group-icon" style="background:${cat.color}22;color:${cat.color}">${cat.name[0]}</div>
      <span class="group-arrow${isOpen ? ' open' : ''}">&#9654;</span>
      <div class="group-info">
        <h2>${escHtml(cat.name)}</h2>
        <div class="group-name-en">${escHtml(cat.en)} &middot; ${subGroups.length} 子分類</div>
      </div>
      <div class="group-stats"><b>${catPassages.length}</b> 段落</div>
    `;

    const body = document.createElement('div');
    body.className = 'group-body' + (isOpen ? ' open' : '');

    header.addEventListener('click', () => {
      const nowOpen = body.classList.toggle('open');
      header.querySelector('.group-arrow').classList.toggle('open', nowOpen);
      if (nowOpen) {
        openSections.add('sc:' + catId);
        if (!body.dataset.rendered) {
          renderSceneSubs(body, subGroups, catId);
          body.dataset.rendered = '1';
        }
      } else {
        openSections.delete('sc:' + catId);
      }
    });

    if (isOpen && !body.dataset.rendered) {
      renderSceneSubs(body, subGroups, catId);
      body.dataset.rendered = '1';
    }

    content.appendChild(header);
    content.appendChild(body);
  });

  // Uncategorized groups
  const categorized = new Set(Object.values(SCENE_CATEGORIES).flatMap(c => c.groups));
  const uncatGroups = allGroups.filter(([gId]) => !categorized.has(gId));
  if (uncatGroups.length > 0) {
    uncatGroups.forEach(([gName, gPassages]) => {
      const isOpen = openSections.has('sc:misc:' + gName);
      const iconInfo = GROUP_ICONS[gName] || ['#64748b', gName.substring(0, 2).toUpperCase(), gName, ''];
      const header = document.createElement('div');
      header.className = 'group-header';
      header.innerHTML = `
        <div class="group-icon" style="background:${iconInfo[0]}22;color:${iconInfo[0]}">${iconInfo[1]}</div>
        <span class="group-arrow${isOpen ? ' open' : ''}">&#9654;</span>
        <div class="group-info">
          <h2>${escHtml(iconInfo[2])}</h2>
          <div class="group-name-en">${escHtml(iconInfo[3] || gName)}</div>
        </div>
        <div class="group-stats"><b>${gPassages.length}</b> 段落</div>
      `;
      const body = document.createElement('div');
      body.className = 'group-body' + (isOpen ? ' open' : '');
      header.addEventListener('click', () => {
        const nowOpen = body.classList.toggle('open');
        header.querySelector('.group-arrow').classList.toggle('open', nowOpen);
        if (nowOpen) {
          openSections.add('sc:misc:' + gName);
          if (!body.dataset.rendered) {
            renderChunked(body, gPassages, 0);
            body.dataset.rendered = '1';
          }
        } else {
          openSections.delete('sc:misc:' + gName);
        }
      });
      if (isOpen && !body.dataset.rendered) {
        renderChunked(body, gPassages, 0);
        body.dataset.rendered = '1';
      }
      content.appendChild(header);
      content.appendChild(body);
    });
  }

  // NPC Gallery at bottom
  renderNpcGallery(content);
}

function renderSceneSubs(container, subGroups, catId) {
  subGroups.forEach(([gId, gPassages]) => {
    const secKey = 'ss:' + catId + ':' + gId;
    const isOpen = openSections.has(secKey);
    const iconInfo = GROUP_ICONS[gId] || ['#64748b', gId.substring(0, 2).toUpperCase(), gId, ''];

      <span class="group-arrow${isOpen ? ' open' : ''}">&#9654;</span>
    `;

    const subBody = document.createElement('div');
    subBody.style.display = isOpen ? 'block' : 'none';
    subBody.style.padding = isOpen ? '4px 8px 8px' : '0';

    subHeader.addEventListener('click', () => {
      const nowOpen = subBody.style.display === 'none';
      subBody.style.display = nowOpen ? 'block' : 'none';
      subBody.style.padding = nowOpen ? '4px 8px 8px' : '0';
      subHeader.querySelector('.group-arrow').classList.toggle('open', nowOpen);
      if (nowOpen) {
        openSections.add(secKey);
        if (!subBody.dataset.rendered) {
          renderChunked(subBody, gPassages, 0);
          subBody.dataset.rendered = '1';
        }
      } else {
        openSections.delete(secKey);
      }
    });

    if (isOpen && !subBody.dataset.rendered) {
      renderChunked(subBody, gPassages, 0);
      subBody.dataset.rendered = '1';
    }

    sub.appendChild(subHeader);
    sub.appendChild(subBody);
    container.appendChild(sub);
  });
}

// === Render Dispatch ===
function resetAndRender() {
  const passages = getFiltered();
  switch (currentView) {
    case 'narrative': renderNarrativeView(passages); break;
    case 'scene': renderSceneView(passages); break;
    case 'all': renderAllView(passages); break;
  }
}

function setActiveView(view) {
  currentView = view;
  openSections.clear();
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  const btnId = view === 'narrative' ? 'viewNarrative' : view === 'scene' ? 'viewScene' : 'viewAll';
  document.getElementById(btnId).classList.add('active');
  resetAndRender();
}

// === Lightbox ===
let lightboxImages = [];
let lightboxIdx = 0;

function openLightbox(src) {
  lightboxImages = Array.from(document.querySelectorAll('.passage-img, .npc-card img')).map(el => el.src).filter(Boolean);
  lightboxIdx = lightboxImages.indexOf(src);
  if (lightboxIdx === -1) { lightboxImages = [src]; lightboxIdx = 0; }
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(e) {
  if (e && e.target.tagName === 'IMG') return;
  document.getElementById('lightboxOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir, e) {
  if (e) { e.stopPropagation(); e.preventDefault(); }
  if (lightboxImages.length <= 1) return;
  lightboxIdx = (lightboxIdx + dir + lightboxImages.length) % lightboxImages.length;
  document.getElementById('lightboxImg').src = lightboxImages[lightboxIdx];
}

// === Init ===
function init() {
  renderBanner();

  let searchTimeout;
  document.getElementById('searchBox').addEventListener('input', e => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      searchQuery = e.target.value.trim();
      openSections.clear();
      resetAndRender();
    }, 300);
  });

  document.getElementById('showZh').addEventListener('change', e => { showZh = e.target.checked; openSections.clear(); resetAndRender(); });
  document.getElementById('showEn').addEventListener('change', e => { showEn = e.target.checked; openSections.clear(); resetAndRender(); });
  document.getElementById('showChoices').addEventListener('change', e => { showChoices = e.target.checked; openSections.clear(); resetAndRender(); });
  document.getElementById('showCond').addEventListener('change', e => { showCond = e.target.checked; openSections.clear(); resetAndRender(); });

  document.getElementById('viewNarrative').addEventListener('click', () => setActiveView('narrative'));
  document.getElementById('viewScene').addEventListener('click', () => setActiveView('scene'));
  document.getElementById('viewAll').addEventListener('click', () => setActiveView('all'));

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    // Lightbox nav
    const overlay = document.getElementById('lightboxOverlay');
    if (overlay.classList.contains('active')) {
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navLightbox(-1);
      if (e.key === 'ArrowRight') navLightbox(1);
      return;
    }
    if (e.key === '/') { e.preventDefault(); document.getElementById('searchBox').focus(); }
    if (e.key === '1') setActiveView('narrative');
    if (e.key === '2') setActiveView('scene');
    if (e.key === '3') setActiveView('all');
    if (e.key === 'Escape') {
      document.getElementById('searchBox').blur();
      searchQuery = '';
      document.getElementById('searchBox').value = '';
      openSections.clear();
      resetAndRender();
    }
  });

  resetAndRender();
}

loadData();
</script>
</body>
</html>
